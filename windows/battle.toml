[engine]
# Ember's transposition-table memory in MiB. Valid range: 1-4096.
hash_mb = 1024
ponder = true
book = "<embedded>"

[benchmark]
depth = 10
repeats = 2
timeout_seconds = 180

[lichess]
url = "https://lichess.org"
# Per-opponent direct challenge acceptance timeout. If it expires, the runner
# cancels that challenge and tries the next ready opponent in the pool.
challenge_timeout_seconds = 15
availability_poll_seconds = 15
opponent_retry_seconds = 300
# 0 means wait indefinitely until one bot in the pool becomes available.
opponent_wait_timeout_seconds = 0
# Local lichess-bot log/PGN polling; this does not call the Lichess API.
game_poll_seconds = 1
game_timeout_seconds = 21600

[[games]]
opponents = [
  "Lynx_BOT",
  "pawn_git",
  "simbelmyne-bot",
  "CubixChess",
  "bot_adario",
  "ResoluteBot",
  "RaspFish",
  "ArasanX",
