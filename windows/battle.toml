  "NewChessEngine-ai",
  "SF_Bot1nok",
  "Bot1nokk",
  "bot1e",
  "YoBot_v2",
  "CloudNetBot",
  "SaxtonEngine",
  "Cheszter",
  "Motor-0",
  "Cheng-4",
  "Cheng-4-NN",
  "Weiawaga",
  "Moment-That-Inspires",
  "duchessAI",
  "Phalanx-XXV",
  "Pseudo-0",
  "rudim-bot",
  "FataliiBot",
  "InanisBot",
  "halcyonbot",
  "RavenEngine",
  "RadianceEngine",
  "likeawizard-bot",
  "admete_bot",
  "eubos",
