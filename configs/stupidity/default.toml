[run]
name = "ember-stupidity-hunt"
time_control = "4+0.04"
timemargin_ms = 2000
rounds_per_pair = 12
max_games = 48
workers = "auto"
worker_multiplier = 1.25
opening_file = "ratings/openings.epd"
opening_format = "epd"
trace = true
artifact_name = "stupidity-artifacts.tar.zst"

[ember]
name = "Ember"
binary = "target/release/ember"
proto = "uci"
features = ["decision-trace", "search-debug"]

[ember.options]
Hash = "64"
Threads = "1"
Book = ""

[stockfish]
name = "Stockfish-UCI-1800"
cmd = "stockfish"
proto = "uci"
uci_elo = 1800
analysis_depth = 12
multipv = 5
verify_depth = 8

[stockfish.options]
UCI_LimitStrength = "true"
UCI_Elo = "1800"
Threads = "1"
Hash = "64"

[render]
fps = 1
board_size = 720
