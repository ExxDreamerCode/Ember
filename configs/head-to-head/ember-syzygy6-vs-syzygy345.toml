[run]
name = "ember-syzygy3456-vs-syzygy345"
depth = 4
workers = "auto"
worker_multiplier = 1.0
max_pairs = 400
min_pairs = 400
batch_pairs = 50
alpha = 0.025
alternative = "two-sided"
opening_source = "polyglot"
polyglot_book = "src/book.bin"
book_min_plies = 8
book_max_plies = 20
opening_format = "epd"
seed = 20260714
results_dir = "results/head-to-head"
rating_interval = 100
max_moves = 220

[build]
command = ["cargo", "build", "--release", "--bin", "ember"]

[engine_a]
name = "Ember-Syzygy3456"
cmd = "target/release/ember"
dir = "."
proto = "uci"

[engine_a.options]
Hash = "64"
Threads = "1"
Book = ""
SyzygyPath = "result-syzygy6/share/syzygy/3-4-5-6"

[engine_b]
name = "Ember-Syzygy345"
cmd = "target/release/ember"
dir = "."
proto = "uci"

[engine_b.options]
Hash = "64"
Threads = "1"
Book = ""
SyzygyPath = "result-syzygy345/share/syzygy/3-4-5"
