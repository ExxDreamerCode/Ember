[run]
name = "ember-current"
time_control = "8+0.08"
timemargin_ms = 2000
rounds_per_pair = 12
calibration_rounds_per_pair = 6
max_games = 240
confidence_target = 80
bootstrap_samples = 200
bootstrap_seed = 20260606
workers = "auto"
worker_multiplier = 1.5
opening_file = "ratings/openings.epd"
opening_format = "epd"
remote_work_root = "~/ember-elo-runs"
artifact_name = "artifacts.tar.zst"

[ember]
name = "Ember"
binary = "target/release/ember"
proto = "uci"
book = "<embedded>"
book_name = "embedded-mini-polyglot"

[ember.options]
Hash = "64"
Threads = "1"
Book = "<embedded>"

[selection]
opponent_file = "ratings/opponents.toml"
min_final_opponents = 4
target_final_opponents = 6
max_family_game_share = 0.34
include_roles = ["final", "bracket"]

[estimator]
primary_scale = "mixed-prior quick calibration"
allow_mixed_sources = true
default_sigma = 250
ember_prior_sigma = 10000
